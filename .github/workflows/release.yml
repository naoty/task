name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build UI
        run: bun run build:ui

      - name: Test
        run: bun test

      - name: Check
        run: bun run check

  build-linux:
    needs: [test]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build UI
        run: bun run build:ui && bun run embed:ui

      - name: Build
        run: |
          bun build --compile --target=bun-linux-x64 src/cli/index.ts --outfile build/task-linux-x64
          bun build --compile --target=bun-linux-arm64 src/cli/index.ts --outfile build/task-linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-bins
          path: build/task-linux-*

  build-darwin:
    needs: [test]
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build UI
        run: bun run build:ui && bun run embed:ui

      - name: Build
        run: |
          bun build --compile --target=bun-darwin-x64 src/cli/index.ts --outfile build/task-darwin-x64
          bun build --compile --target=bun-darwin-arm64 src/cli/index.ts --outfile build/task-darwin-arm64

      - name: Sign
        run: |
          cat > entitlements.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>com.apple.security.cs.allow-jit</key>
            <true/>
            <key>com.apple.security.cs.allow-unsigned-executable-memory</key>
            <true/>
          </dict>
          </plist>
          EOF
          codesign --entitlements entitlements.plist --sign - build/task-darwin-x64 --force
          codesign --entitlements entitlements.plist --sign - build/task-darwin-arm64 --force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: darwin-bins
          path: build/task-darwin-*

  release:
    needs: [build-linux, build-darwin]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-bins
          path: build

      - name: Download Darwin artifacts
        uses: actions/download-artifact@v4
        with:
          name: darwin-bins
          path: build

      - name: Extract release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md > release_notes.txt

      - name: Create GitHub Release
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.txt \
            build/task-linux-x64 \
            build/task-linux-arm64 \
            build/task-darwin-x64 \
            build/task-darwin-arm64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-homebrew:
    needs: [release]
    runs-on: ubuntu-latest

    steps:
      - name: Download Darwin artifacts
        uses: actions/download-artifact@v4
        with:
          name: darwin-bins
          path: build

      - name: Calculate checksums
        run: |
          SHA256_ARM64=$(sha256sum build/task-darwin-arm64 | awk '{print $1}')
          SHA256_X64=$(sha256sum build/task-darwin-x64 | awk '{print $1}')
          echo "SHA256_ARM64=$SHA256_ARM64" >> $GITHUB_ENV
          echo "SHA256_X64=$SHA256_X64" >> $GITHUB_ENV

      - name: Update Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          git clone https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/naoty/homebrew-misc.git
          cat > homebrew-misc/Formula/task.rb << EOF
          class Task < Formula
            desc "Task management CLI"
            homepage "https://github.com/naoty/task"
            version "$VERSION"

            on_macos do
              on_arm do
                url "https://github.com/naoty/task/releases/download/${GITHUB_REF_NAME}/task-darwin-arm64"
                sha256 "$SHA256_ARM64"

                def install
                  bin.install "task-darwin-arm64" => "task"
                end
              end

              on_intel do
                url "https://github.com/naoty/task/releases/download/${GITHUB_REF_NAME}/task-darwin-x64"
                sha256 "$SHA256_X64"

                def install
                  bin.install "task-darwin-x64" => "task"
                end
              end
            end

            test do
              system "#{bin}/task", "--help"
            end
          end
          EOF
          cd homebrew-misc
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add Formula/task.rb
          git commit -m "Update task to ${GITHUB_REF_NAME}"
          git push
